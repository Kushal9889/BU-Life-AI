services:
  - type: web
    name: bulife-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: CHAT_MODEL
        value: meta/llama-3.3-70b-instruct
      - key: EMBEDDING_MODEL
        value: nvidia/nv-embedqa-e5-v5
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://bulife-ai.netlify.app
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_PROJECT
        value: bulife-ai
